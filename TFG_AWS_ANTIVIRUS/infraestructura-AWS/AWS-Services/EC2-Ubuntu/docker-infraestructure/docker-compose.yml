services:
  # Nginx - Reverse Proxy con HTTPS
  nginx:
    image: nginx:alpine
    container_name: drive-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Nginx/ssl:/etc/nginx/ssl:ro
      - ./Nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
    networks:
      - frontend
    restart: unless-stopped

  # Aplicación Web (Frontend React - NO TERMINADA)
  web:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: drive-web
    expose:
      - "80"
    networks:
      - frontend
    restart: unless-stopped

  # API Backend
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: drive-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - ANTIVIRUS_URL=${ANTIVIRUS_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PORT=${S3_PORT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_USE_SSL=${S3_USE_SSL}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_EC2_METADATA_SERVICE_ENDPOINT=http://169.254.169.254
      - AWS_EC2_METADATA_SERVICE_ENDPOINT_MODE=IPv4
    depends_on:
      - db
    networks:
      - frontend
      - backend
      - antivirus-network
    restart: unless-stopped

  # Base de Datos MariaDB (solo gestión de usuarios de DriveCloud, usando tu imagen personalizada)
  db:
    image: mariadb:11
    container_name: usuarios-webdb
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
      - ./Database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    restart: unless-stopped

  # Antivirus Control-AM
  antivirus:
    build:
      context: ./ConTrol
      dockerfile: control-dockerfile
    container_name: Control-AM    
    expose:
      - "5000"  
    # testing forward                       ----------------------------------------------------------------------------------------------- 
    ports:
      - "5000:5000"
    #                                       -----------------------------------------------------------------------------------------------
    # volumes:
    #   - ./antivirus/config:/config
    networks:
      - antivirus-network
    restart: unless-stopped
    # environment:
    #   - AV_CONFIG=...

networks:
  # Red para frontend (Nginx -> Web/API)
  frontend:
    driver: bridge
    internal: false
  
  # Red privada para backend (API -> DB)
  backend:
    driver: bridge
    internal: true
  
  # Red privada para antivirus (API -> Antivirus)
  antivirus-network:
    driver: bridge
    internal: true

# Almacenamiento de información de clientes
volumes:
  db-data:
    driver: local
